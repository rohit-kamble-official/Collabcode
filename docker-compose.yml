version: "3.9"

services:
  # ── Backend + Frontend (production build) ─────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend Dev Server (for development only) ────────────────────────────
  frontend-dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./Frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_API_URL=http://localhost:3000
    profiles:
      - dev  # Only started with: docker compose --profile dev up

  # ── Backend Dev Server (for development only) ─────────────────────────────
  backend-dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./Backend:/app
      - backend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-prod}
      - FRONTEND_URL=http://localhost:5173
    profiles:
      - dev

volumes:
  frontend_node_modules:
  backend_node_modules:
